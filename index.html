<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aluguel de Axies</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1 data-i18n="title">🐾 Aluguel de Axies</h1>
  <div class="lang-switcher">
    <button class="lang-btn flag-pt" data-lang="pt" title="Português"><span class="flag-accent"></span><span class="flag-label">PT</span></button>
    <button class="lang-btn flag-en" data-lang="en" title="English"><span class="flag-accent"></span><span class="flag-label">EN</span></button>
    <button class="lang-btn flag-es" data-lang="es" title="Español"><span class="flag-accent"></span><span class="flag-label">ES</span></button>
    <button class="lang-btn flag-fil" data-lang="fil" title="Filipino"><span class="flag-accent"></span><span class="flag-label">FIL</span></button>
  </div>
  <div class="discord-contact">💬 <span data-i18n="discordContact"></span> <strong>fuly_12</strong></div>
  <div class="stats">
    <span id="statTotal">0</span> <span data-i18n="statTotalLabel"></span> ·
    <span id="statDisponivel">0</span> <span data-i18n="statAvailableLabel"></span> ·
    <span id="statAlugado">0</span> <span data-i18n="statRentedLabel"></span>
  </div>
  <button id="exportBtn" class="lock-btn" style="display:none" data-i18n="exportBtnLabel"></button>
  <button id="lockBtn" class="lock-btn"></button>
</header>

<div id="lockModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3 data-i18n="lockModalTitle"></h3>
    <p data-i18n="lockModalDesc"></p>
    <input type="password" id="lockPasswordInput" data-i18n-placeholder="lockPasswordPlaceholder">
    <div class="modal-error" id="lockError" style="display:none" data-i18n="lockErrorText"></div>
    <div class="modal-actions">
      <button id="lockCancel" class="modal-btn secondary" data-i18n="cancelBtn"></button>
      <button id="lockConfirm" class="modal-btn primary" data-i18n="enterBtn"></button>
    </div>
  </div>
</div>

<div id="exportModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3 data-i18n="exportModalTitle"></h3>
    <p data-i18n="exportModalDesc"></p>
    <textarea id="exportTextarea" readonly rows="6"></textarea>
    <div class="modal-actions">
      <button id="exportClose" class="modal-btn primary" data-i18n="closeBtn"></button>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<div class="view-tabs">
  <button class="view-tab active" id="tabStandard" data-view="standard" data-i18n="tabStandard"></button>
  <button class="view-tab" id="tabMorph" data-view="morph" data-i18n="tabMorph"></button>
</div>

<section class="filters">
  <div class="filter-group">
    <label data-i18n="searchLabel"></label>
    <input type="text" id="searchId" data-i18n-placeholder="searchPlaceholder">
  </div>

  <div class="filter-group">
    <label data-i18n="classLabel"></label>
    <select id="filterClass">
      <option value="" data-i18n="optAll"></option>
    </select>
  </div>

  <div class="filter-group">
    <label data-i18n="statusLabel"></label>
    <select id="filterStatus">
      <option value="" data-i18n="optAll"></option>
      <option value="disponivel" data-i18n="optAvailable"></option>
      <option value="alugado" data-i18n="optRented"></option>
    </select>
  </div>

  <div class="filter-group">
    <label data-i18n="collectibleLabel"></label>
    <select id="filterCollectibleTag">
      <option value="" data-i18n="optAll"></option>
    </select>
  </div>

  <div class="filter-group filter-checkbox">
    <label>
      <input type="checkbox" id="filterShowAll">
      <span data-i18n="showAllLabel"></span>
    </label>
  </div>

</section>

<main id="grid" class="grid"></main>

<footer class="foot" data-i18n="footerText"></footer>

<script src="axie-renderer.bundle.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
